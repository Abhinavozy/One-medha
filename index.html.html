const STYLES=`
@keyframes omFloat { 0%,100%{transform:translateY(0px)} 50%{transform:translateY(-6px)} }
@keyframes omFloatSlow { 0%,100%{transform:translateY(0px)} 50%{transform:translateY(-3px)} }
@keyframes omWave { 0%,100%{transform:rotate(0deg)} 20%{transform:rotate(-18deg)} 40%{transform:rotate(14deg)} 60%{transform:rotate(-12deg)} 80%{transform:rotate(8deg)} }
@keyframes omBounce { 0%,100%{transform:translateY(0) scale(1)} 30%{transform:translateY(-14px) scale(1.05)} 60%{transform:translateY(-5px) scale(0.97)} }
@keyframes omShake { 0%,100%{transform:translateX(0)} 15%{transform:translateX(-5px) rotate(-3deg)} 30%{transform:translateX(5px) rotate(3deg)} 45%{transform:translateX(-4px)} 60%{transform:translateX(4px)} 75%{transform:translateX(-2px)} 90%{transform:translateX(2px)} }
@keyframes omTilt { 0%,100%{transform:rotate(0deg)} 50%{transform:rotate(-12deg)} }
@keyframes omBreath { 0%,100%{transform:scale(1)} 50%{transform:scale(1.04)} }
@keyframes omBlink { 0%,90%,100%{scaleY:1} 95%{scaleY:0.05} }
@keyframes omGlow { 0%,100%{filter:drop-shadow(0 0 8px rgba(124,58,237,0.6))} 50%{filter:drop-shadow(0 0 16px rgba(124,58,237,0.9))} }
@keyframes omGlowGreen { 0%,100%{filter:drop-shadow(0 0 8px rgba(34,197,94,0.5))} 50%{filter:drop-shadow(0 0 16px rgba(34,197,94,0.8))} }
@keyframes omGlowRed { 0%,100%{filter:drop-shadow(0 0 8px rgba(239,68,68,0.6))} 50%{filter:drop-shadow(0 0 18px rgba(239,68,68,1))} }
@keyframes omGlowYellow { 0%,100%{filter:drop-shadow(0 0 8px rgba(245,158,11,0.5))} 50%{filter:drop-shadow(0 0 16px rgba(245,158,11,0.8))} }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
@keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
@keyframes slideUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
@keyframes chatPop { from{opacity:0;transform:scale(0.9) translateY(10px)} to{opacity:1;transform:scale(1) translateY(0)} }
@keyframes spin { to{transform:rotate(360deg)} }
@keyframes confettiFall { 0%{transform:translateY(-10px) rotate(0deg);opacity:1} 100%{transform:translateY(40px) rotate(720deg);opacity:0} }
@keyframes starTwinkle { 0%,100%{transform:scale(1) rotate(0deg);opacity:0.7} 50%{transform:scale(1.3) rotate(15deg);opacity:1} }
@keyframes notifSlide { from{opacity:0;transform:translateX(20px)} to{opacity:1;transform:translateX(0)} }
.om-idle { animation: omFloat 3s ease-in-out infinite, omGlow 3s ease-in-out infinite; }
.om-greeting { animation: omWave 1.2s ease-in-out, omGlow 2s ease-in-out infinite; }
.om-thinking { animation: omTilt 2s ease-in-out infinite, omGlow 2s ease-in-out infinite; }
.om-achievement { animation: omBounce 0.8s ease-in-out, omGlowGreen 1s ease-in-out infinite; }
.om-urgent { animation: omShake 0.6s ease-in-out infinite, omGlowRed 0.8s ease-in-out infinite; }
.om-study { animation: omFloatSlow 4s ease-in-out infinite, omGlowYellow 3s ease-in-out infinite; }
.om-chat { animation: omBreath 2s ease-in-out infinite, omGlow 2s ease-in-out infinite; }
.fade-in { animation: fadeIn 0.35s ease-out both; }
.slide-up { animation: slideUp 0.4s ease-out both; }
.chat-pop { animation: chatPop 0.3s cubic-bezier(0.34,1.56,0.64,1) both; }
input::placeholder, textarea::placeholder { color: ${C.muted} !important; }
